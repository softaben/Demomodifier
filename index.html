<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EL FATH SERVICE - نظام إدارة الائتمان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-body: #F5F7FA;
            --bg-card: #FFFFFF;
            --text-primary: #1A2F3E;
            --text-secondary: #5A6E7C;
            --border-light: #E2E8F0;
            --border-input: #CBD5E1;
            --accent: #0D9488;
            --accent-hover: #0F766E;
            --accent-bg-light: #F0FDFA;
            --success: #059669;
            --success-bg: #D1FAE5;
            --danger: #DC2626;
            --danger-bg: #FEE2E2;
            --warning: #D97706;
            --warning-bg: #FEF3C7;
            --info: #2563EB;
            --nav-hover: #F1F5F9;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --progress-bg: #E2E8F0;
        }
        body.dark {
            --bg-body: #0F172A;
            --bg-card: #1E293B;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --border-light: #334155;
            --border-input: #475569;
            --accent: #14B8A6;
            --accent-hover: #2DD4BF;
            --accent-bg-light: #134E4A;
            --success: #10B981;
            --success-bg: #064E3B;
            --danger: #F87171;
            --danger-bg: #7F1D1D;
            --warning: #FBBF24;
            --warning-bg: #78350F;
            --info: #60A5FA;
            --nav-hover: #334155;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --progress-bg: #334155;
        }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg-body); color: var(--text-primary); transition: 0.2s; }
        .app-container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        .app-header { background: var(--bg-card); border-radius: 16px; padding: 20px 28px; margin-bottom: 28px; border: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo-area h1 { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
        .logo-area p { font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px; }
        .logo-area i { margin-left: 8px; }
        .btn-icon { background: var(--nav-hover); border: 1px solid var(--border-input); border-radius: 10px; padding: 8px 18px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; color: var(--text-primary); font-weight: 500; transition: 0.2s; }
        .btn-icon:hover { background: var(--border-light); border-color: var(--accent); }
        .app-nav { display: flex; gap: 6px; background: var(--bg-card); border-radius: 14px; padding: 6px; border: 1px solid var(--border-light); margin-bottom: 28px; flex-wrap: wrap; }
        .nav-tab { padding: 10px 24px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.9rem; color: var(--text-secondary); transition: 0.2s; }
        .nav-tab i { margin-left: 8px; }
        .nav-tab:hover { background: var(--nav-hover); color: var(--text-primary); }
        .nav-tab.active { background: var(--accent); color: white; }
        .two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 28px; }
        .card { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-light); padding: 24px; box-shadow: var(--shadow-sm); }
        .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 3px solid var(--accent); display: inline-block; color: var(--text-primary); }
        .form-group { margin-bottom: 18px; }
        label { font-size: 0.8rem; font-weight: 600; display: block; margin-bottom: 6px; }
        input, select, textarea { width: 100%; padding: 10px 12px; background: var(--bg-card); border: 1px solid var(--border-input); border-radius: 10px; color: var(--text-primary); font-size: 0.9rem; font-family: 'Tajawal', monospace; transition: 0.2s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(13,148,136,0.15); }
        button { background: var(--accent); border: none; padding: 10px 16px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; color: white; font-size: 0.9rem; transition: 0.2s; }
        button:hover { background: var(--accent-hover); transform: translateY(-1px); }
        button.success { background: var(--success); }
        button.danger { background: var(--danger); }
        button.info { background: var(--info); }
        .row { display: flex; gap: 12px; margin-bottom: 16px; }
        .row button { margin: 0; }
        .list-container { max-height: 460px; overflow-y: auto; }
        .list-item { background: var(--bg-card); padding: 16px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border-light); cursor: pointer; transition: 0.2s; }
        .list-item:hover { border-color: var(--accent); background: var(--accent-bg-light); }
        .client-name { font-weight: 800; color: var(--text-primary); font-size: 1rem; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 30px; font-size: 0.7rem; font-weight: 700; }
        .badge-paid { background: var(--success-bg); color: var(--success); }
        .badge-partial { background: var(--warning-bg); color: var(--warning); }
        .badge-unpaid { background: var(--danger-bg); color: var(--danger); }
        .progress-bar { height: 6px; background: var(--progress-bg); border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 10px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .small-text { font-size: 0.7rem; color: var(--text-secondary); margin-top: 6px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); border-radius: 20px; padding: 28px; max-width: 600px; width: 90%; max-height: 90vh; overflow: auto; border: 1px solid var(--border-light); }
        .modal-header { font-weight: 800; font-size: 1.3rem; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .hidden { display: none; }
        .order-payment-card { background: var(--bg-body); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border-light); cursor: pointer; transition: 0.2s; }
        .order-payment-card.selected { background: var(--accent-bg-light); border-color: var(--accent); }
        .small-icon-btn { background: var(--nav-hover); border-radius: 30px; padding: 5px 12px; font-size: 0.7rem; width: auto; display: inline-flex; align-items: center; gap: 5px; cursor: pointer; border: none; color: var(--text-primary); }
        .total-payment-card { background: var(--nav-hover); padding: 16px; margin-top: 16px; border-radius: 12px; text-align: center; }
        .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; margin: 15px 0; }
        @media (max-width:800px){ .two-columns{ grid-template-columns:1fr; } .app-container{ padding: 12px; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <div class="logo-area">
            <h1><i class="fas fa-chart-line"></i> EL FATH SERVICE</h1>
            <p>نظام إدارة الائتمان والمبيعات</p>
        </div>
        <div style="display: flex; gap: 12px;">
            <button class="btn-icon" id="themeToggleBtn"><i class="fas fa-moon"></i> <span id="themeText">الوضع الداكن</span></button>
            <button class="btn-icon" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </div>
    <div class="app-nav">
        <div class="nav-tab active" onclick="showTab('clients')"><i class="fas fa-users"></i> العملاء</div>
        <div class="nav-tab" onclick="showTab('orders')"><i class="fas fa-file-alt"></i> الطلبات</div>
        <div class="nav-tab" onclick="showTab('payments')"><i class="fas fa-money-bill-wave"></i> المدفوعات</div>
        <div class="nav-tab" onclick="showTab('situation')"><i class="fas fa-chart-line"></i> الوضعية</div>
    </div>

    <!-- Clients Tab -->
    <div id="clientsTab"><div class="two-columns"><div class="card"><div class="card-title"><i class="fas fa-user-plus"></i> عميل جديد</div><div class="form-group"><label>الاسم الكامل *</label><input type="text" id="newClientName" placeholder="مثال: أحمد بن علي"></div><div class="form-group"><label>رقم الهاتف</label><input type="tel" id="newClientPhone"></div><div class="form-group"><label>العنوان</label><input type="text" id="newClientAddress"></div><button id="saveClientBtn" class="success"><i class="fas fa-save"></i> إضافة عميل</button></div><div class="card"><div class="flex-between"><div class="card-title"><i class="fas fa-list"></i> قائمة العملاء</div><button class="small-icon-btn" onclick="showDeleteAllModal('clients')"><i class="fas fa-trash"></i> حذف الكل</button></div><input type="text" id="searchClientsList" placeholder="بحث عن عميل..." oninput="renderClientsList()"><div class="list-container" id="clientsList"></div></div></div></div>

    <!-- Orders Tab -->
    <div id="ordersTab" class="hidden"><div class="two-columns"><div class="card"><div class="card-title"><i class="fas fa-cart-plus"></i> طلب جديد</div><div class="form-group"><label>اختر العميل *</label><select id="orderClientSelect"><option>-- اختر --</option></select></div><div class="form-group"><label>رقم الطلب</label><input type="text" id="orderNumber" placeholder="رقم الفاتورة"></div><div class="form-group"><label>المبلغ الإجمالي (MAD) *</label><input type="number" id="orderAmount" placeholder="0.00"></div><div class="form-group"><label>تاريخ الاستحقاق</label><input type="date" id="orderDueDate"></div><div class="form-group"><label>ملاحظات</label><textarea id="orderNotes" rows="2"></textarea></div><button id="saveOrderBtn" class="success">حفظ الطلب</button></div><div class="card"><div class="flex-between"><div class="card-title"><i class="fas fa-file-invoice"></i> قائمة الطلبات</div><button class="small-icon-btn" onclick="showDeleteAllModal('orders')"><i class="fas fa-trash"></i> حذف الكل</button></div><input type="text" id="searchOrders" placeholder="بحث..." oninput="renderOrdersList()"><div class="list-container" id="ordersList"></div></div></div></div>

    <!-- Payments Tab -->
    <div id="paymentsTab" class="hidden"><div class="two-columns"><div class="card"><div class="card-title"><i class="fas fa-hand-holding-usd"></i> طريقة الدفع</div><div class="row"><button onclick="setPaymentMode('single')" id="singleModeBtn" style="background:var(--accent);">دفع فردي</button><button onclick="setPaymentMode('multi')" id="multiModeBtn" style="background:var(--nav-hover);">دفع متعدد</button></div></div></div><div id="singlePaymentCard" class="card"><div class="card-title"><i class="fas fa-receipt"></i> تسجيل دفعة</div><select id="paymentClientSelect" onchange="loadClientOrdersForPayment()"><option>-- اختر عميل --</option></select><select id="paymentOrderSelect" onchange="updatePaymentInfo()"><option>-- اختر طلب --</option></select><div id="paymentOrderInfo" style="background:var(--nav-hover);padding:12px;border-radius:12px;margin-bottom:15px;"></div><input type="number" id="paymentAmount" placeholder="المبلغ المدفوع"><input type="date" id="paymentDate"><select id="paymentMethod"><option>نقداً</option><option>تحويل بنكي</option><option>بطاقة ائتمان</option><option>شيك</option></select><input type="text" id="paymentNotes" placeholder="ملاحظات"><button id="savePaymentBtn" class="success">تسجيل الدفع</button></div><div id="multiPaymentCard" class="card hidden"><div class="card-title"><i class="fas fa-layer-group"></i> دفع متعدد الطلبات</div><select id="multiClientSelect" onchange="loadMultiClientOrdersModern()"><option>-- اختر عميل --</option></select><div id="multiOrdersListModern"></div><div class="total-payment-card"><label>💰 المبلغ الإجمالي للدفع</label><input type="number" id="totalPaymentAmount" step="0.01"><button onclick="distributePaymentModern()" style="margin-top:8px;background:var(--info);">توزيع تلقائي</button></div><input type="date" id="multiPaymentDate"><select id="multiPaymentMethod"><option>نقداً</option><option>تحويل بنكي</option><option>بطاقة</option></select><input type="text" id="multiPaymentNotes"><button id="saveMultiPaymentBtn" class="success">تسديد</button></div><div class="card"><div class="card-title"><i class="fas fa-history"></i> آخر المدفوعات</div><div id="recentPaymentsList" class="list-container"></div></div></div>

    <!-- Situation Tab -->
    <div id="situationTab" class="hidden"><div class="card"><div class="flex-between"><div class="card-title"><i class="fas fa-chart-simple"></i> تقرير الوضعية المالية</div><button class="small-icon-btn" onclick="showDeleteAllModal('all')"><i class="fas fa-trash"></i> حذف الكل</button></div><div class="filter-bar"><input type="date" id="filterDateStart"><input type="date" id="filterDateEnd"><select id="filterPeriodPreset" onchange="applyPresetFilter()"><option value="">فترة مخصصة</option><option value="today">اليوم</option><option value="week">هذا الأسبوع</option><option value="month">هذا الشهر</option></select><button onclick="applyDateFilter()" class="info">تطبيق</button><button onclick="resetPeriodFilter()">إلغاء</button></div><div class="flex-between" style="margin:15px 0"><span><i class="fas fa-file-pdf"></i> تقارير العميل</span><div><button onclick="exportClientPaymentsPDF()" class="small-icon-btn" style="background:var(--success);">PDF المدفوعات</button><button onclick="exportClientOrdersPDF()" class="small-icon-btn" style="background:var(--danger);">PDF الطلبات</button></div></div><select id="reportClientSelect"><option>-- اختر عميلاً --</option></select><div class="row" style="margin:15px 0;"><button onclick="exportSituationPDF()" class="danger"><i class="fas fa-file-pdf"></i> PDF التقرير العام</button><button onclick="exportSituationExcel()" class="success"><i class="fas fa-file-excel"></i> Excel التقرير</button></div><div id="situationList" class="list-container"></div></div></div>
</div>

<!-- Modals -->
<div id="deleteConfirmModal" class="modal"><div class="modal-content"><div class="modal-header">⚠️ تأكيد الحذف <button onclick="closeModal('deleteConfirmModal')" style="background:none; width:auto; color:var(--text-primary);">✕</button></div><div id="deleteConfirmMessage" style="margin:20px 0; text-align:center;"></div><div class="row"><button onclick="closeModal('deleteConfirmModal')">إلغاء</button><button id="confirmDeleteBtn" class="danger">تأكيد الحذف</button></div></div></div>
<div id="orderDetailModal" class="modal"><div class="modal-content"><div class="modal-header">تفاصيل الطلب <button onclick="closeModal('orderDetailModal')" style="background:none; width:auto;">✕</button></div><div id="orderDetailContent"></div><div class="row"><button id="printOrderBtn" class="info"><i class="fas fa-print"></i> طباعة PDF</button><button onclick="closeModal('orderDetailModal')">إغلاق</button></div></div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyB-TBjgISvKwJnYc7hNRoUcNLhxRnJvVE0", authDomain: "stock-c1643.firebaseapp.com", projectId: "stock-c1643", storageBucket: "stock-c1643.firebasestorage.app", messagingSenderId: "935549361989", appId: "1:935549361989:web:5407897ba6febc50f1682c" };
    const app = firebase.initializeApp(firebaseConfig); const db = firebase.database(); const auth = firebase.auth();
    let currentUser, clients=[], orders=[], payments=[], currentPaymentMode='single', multiOrdersSelected={}, modernOrdersList=[], dateFilterStart=null, dateFilterEnd=null;

    // تنسيق الأرقام: 100 000,00
    function formatNumber(amount) { if (amount === undefined || amount === null) return '0,00'; let parts = amount.toFixed(2).split('.'); let integerPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' '); return integerPart + ',' + parts[1]; }
    function formatMoney(amount) { return formatNumber(amount) + ' MAD'; }
    function formatDate(d){ return d ? new Date(d).toLocaleDateString('ar-EG') : ''; }
    function showFlash(msg,type='success'){ let d=document.createElement('div'); d.style.cssText=`position:fixed;bottom:20px;right:20px;background:${type==='success'?'#059669':'#DC2626'};color:white;padding:12px 20px;border-radius:12px;z-index:9999;font-size:14px;font-weight:500;`; d.innerText=msg; document.body.appendChild(d); setTimeout(()=>d.remove(),3000); }

    auth.onAuthStateChanged(user => { if(user){ currentUser=user; loadData(); initTheme(); } else showLogin(); });
    function showLogin(){ document.body.insertAdjacentHTML('beforeend',`<div id="loginModal" class="modal active"><div class="modal-content"><div class="modal-header" style="justify-content:center;">🔐 تسجيل الدخول</div><input id="loginEmail" placeholder="البريد الإلكتروني" style="margin-bottom:10px;"><input id="loginPass" type="password" placeholder="كلمة المرور"><button onclick="doLogin()" style="margin-top:15px;">دخول</button><div id="loginError" style="color:var(--danger);margin-top:10px;"></div></div></div>`); }
    window.doLogin=async()=>{ try{ await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value,document.getElementById('loginPass').value); document.getElementById('loginModal')?.remove(); }catch(e){ document.getElementById('loginError').innerText=e.message; } };
    window.logout=()=>auth.signOut(); document.getElementById('logoutBtn').onclick=()=>logout();

    async function loadData(){ const uid=currentUser.uid; 
        db.ref(`users/${uid}/clients`).on('value',snap=>{ clients=snap.exists()?Object.values(snap.val()):[]; renderClientsList(); updateAllSelects(); renderSituationClients(); updateReportClientSelect(); }); 
        db.ref(`users/${uid}/orders`).on('value',snap=>{ orders=snap.exists()?Object.values(snap.val()):[]; renderOrdersList(); renderSituationClients(); }); 
        db.ref(`users/${uid}/payments`).on('value',snap=>{ payments=snap.exists()?Object.values(snap.val()):[]; renderRecentPayments(); renderOrdersList(); renderSituationClients(); }); 
    }
    function openModal(id){ document.getElementById(id).classList.add('active'); }
    function closeModal(id){ document.getElementById(id)?.classList.remove('active'); if(id==='tempModal') document.getElementById(id)?.remove(); }
    window.closeModal=closeModal;

    function renderClientsList(){ const cont=document.getElementById('clientsList'); const search=document.getElementById('searchClientsList')?.value.toLowerCase()||''; let f=search?clients.filter(c=>c.name.toLowerCase().includes(search)):clients; if(!f.length){ cont.innerHTML='<div style="padding:30px;text-align:center;">📭 لا يوجد عملاء</div>'; return; } cont.innerHTML=f.map(c=>`<div class="list-item" onclick="showClientOrders('${c.id}')"><div class="flex-between"><span class="client-name">👤 ${c.name}</span><div><button class="small-icon-btn" onclick="event.stopPropagation();editClient('${c.id}')"><i class="fas fa-edit"></i></button><button class="small-icon-btn" onclick="event.stopPropagation();deleteSingleClient('${c.id}')"><i class="fas fa-trash"></i></button></div></div>${c.phone?`<div class="small-text">📞 ${c.phone}</div>`:''}${c.address?`<div class="small-text">📍 ${c.address}</div>`:''}</div>`).join(''); }
    window.editClient=(id)=>{ let c=clients.find(c=>c.id===id); let name=prompt('الاسم الجديد:',c.name); if(name) db.ref(`users/${currentUser.uid}/clients/${id}`).update({name:name.trim()}); };
    window.deleteSingleClient=async(id)=>{ if(!confirm('حذف العميل وجميع بياناته؟'))return; for(let o of orders.filter(o=>o.clientId===id)){ for(let p of payments.filter(p=>p.orderId===o.id)) await db.ref(`users/${currentUser.uid}/payments/${p.id}`).remove(); await db.ref(`users/${currentUser.uid}/orders/${o.id}`).remove(); } await db.ref(`users/${currentUser.uid}/clients/${id}`).remove(); showFlash('تم حذف العميل'); };
    document.getElementById('saveClientBtn').onclick=async()=>{ let name=document.getElementById('newClientName').value.trim(); if(!name) return showFlash('الاسم مطلوب'); await db.ref(`users/${currentUser.uid}/clients/${Date.now()}`).set({id:Date.now().toString(),name,phone:document.getElementById('newClientPhone').value,address:document.getElementById('newClientAddress').value,date:new Date().toISOString()}); showFlash('تمت إضافة العميل'); document.getElementById('newClientName').value=''; };

    function renderOrdersList(){ const cont=document.getElementById('ordersList'); let f=orders; if(!f.length){ cont.innerHTML='<div style="padding:30px;text-align:center;">📭 لا توجد طلبات</div>'; return; } cont.innerHTML=f.map(o=>{ let c=clients.find(c=>c.id===o.clientId); let paid=payments.filter(p=>p.orderId===o.id).reduce((a,b)=>a+b.amount,0); let perc=(paid/o.amount)*100; return `<div class="list-item" onclick="showOrderDetail('${o.id}')"><div class="flex-between"><span class="client-name">${c?.name||'?'}</span><span class="badge ${paid>=o.amount?'badge-paid':paid>0?'badge-partial':'badge-unpaid'}">${paid>=o.amount?'مدفوع':paid>0?'جزئي':'غير مدفوع'}</span></div><div>🔢 ${o.orderNumber} · ${formatMoney(o.amount)}</div><div class="progress-bar"><div class="progress-fill" style="width:${perc}%"></div></div><div class="small-text">✅ المتبقي: ${formatMoney(o.amount-paid)}</div></div>`; }).join(''); }
    document.getElementById('saveOrderBtn').onclick=async()=>{ let clientId=document.getElementById('orderClientSelect').value; let amount=parseFloat(document.getElementById('orderAmount').value); if(!clientId||isNaN(amount)||amount<=0) return showFlash('العميل والمبلغ مطلوبان'); await db.ref(`users/${currentUser.uid}/orders/${Date.now()}`).set({id:Date.now().toString(),clientId,orderNumber:document.getElementById('orderNumber').value.trim()||`CMD-${Date.now()}`,amount,dueDate:document.getElementById('orderDueDate').value,notes:document.getElementById('orderNotes').value,date:new Date().toISOString()}); showFlash('تمت إضافة الطلب'); document.getElementById('orderAmount').value=''; };

    function updateAllSelects(){ ['orderClientSelect','paymentClientSelect','multiClientSelect'].forEach(id=>{ let s=document.getElementById(id); if(s){ s.innerHTML='<option value="">-- اختر --</option>'; clients.forEach(c=>s.innerHTML+=`<option value="${c.id}">${c.name}</option>`); } }); }
    function updateReportClientSelect(){ let sel=document.getElementById('reportClientSelect'); if(sel){ sel.innerHTML='<option value="">-- اختر عميلاً --</option>'; clients.forEach(c=>sel.innerHTML+=`<option value="${c.id}">${c.name}</option>`); } }
    function setPaymentMode(mode){ currentPaymentMode=mode; document.getElementById('singlePaymentCard').classList.toggle('hidden',mode!=='single'); document.getElementById('multiPaymentCard').classList.toggle('hidden',mode!=='multi'); document.getElementById('singleModeBtn').style.background=mode==='single'?'var(--accent)':'var(--nav-hover)'; document.getElementById('multiModeBtn').style.background=mode==='multi'?'var(--accent)':'var(--nav-hover)'; }
    window.setPaymentMode=setPaymentMode; setPaymentMode('single');
    window.loadClientOrdersForPayment=()=>{ let cid=document.getElementById('paymentClientSelect').value; let sel=document.getElementById('paymentOrderSelect'); if(!cid){ sel.innerHTML='<option>--</option>'; return; } let clientOrders=orders.filter(o=>o.clientId===cid); sel.innerHTML='<option value="">-- اختر طلب --</option>'; clientOrders.forEach(o=>{ let paid=payments.filter(p=>p.orderId===o.id).reduce((a,b)=>a+b.amount,0); sel.innerHTML+=`<option value="${o.id}">${o.orderNumber} - المتبقي: ${formatMoney(o.amount-paid)}</option>`; }); };
    window.updatePaymentInfo=()=>{ let oid=document.getElementById('paymentOrderSelect').value; if(!oid)return; let o=orders.find(o=>o.id===oid); let paid=payments.filter(p=>p.orderId===oid).reduce((a,b)=>a+b.amount,0); document.getElementById('paymentOrderInfo').innerHTML=`<strong>${o.orderNumber}</strong><br>💰 الإجمالي: ${formatMoney(o.amount)}<br>✅ المدفوع: ${formatMoney(paid)}<br>⚠️ المتبقي: ${formatMoney(o.amount-paid)}`; document.getElementById('paymentAmount').value=(o.amount-paid).toFixed(2); document.getElementById('paymentDate').value=new Date().toISOString().split('T')[0]; };
    document.getElementById('savePaymentBtn').onclick=async()=>{ let orderId=document.getElementById('paymentOrderSelect').value; let amount=parseFloat(document.getElementById('paymentAmount').value); if(!orderId||isNaN(amount)||amount<=0) return; let o=orders.find(o=>o.id===orderId); let paid=payments.filter(p=>p.orderId===orderId).reduce((a,b)=>a+b.amount,0); if(amount>o.amount-paid) return showFlash('المبلغ يتجاوز المتبقي'); let c=clients.find(c=>c.id===o.clientId); await db.ref(`users/${currentUser.uid}/payments/${Date.now()}`).set({id:Date.now().toString(),orderId,clientId:o.clientId,clientName:c?.name,orderNumber:o.orderNumber,amount,date:new Date(document.getElementById('paymentDate').value).toISOString(),method:document.getElementById('paymentMethod').value,notes:document.getElementById('paymentNotes').value,timestamp:Date.now()}); showFlash('تم تسجيل الدفع'); loadClientOrdersForPayment(); };
    window.loadMultiClientOrdersModern=()=>{ let cid=document.getElementById('multiClientSelect').value; let container=document.getElementById('multiOrdersListModern'); if(!cid){ container.innerHTML=''; return; } let clientOrders=orders.filter(o=>o.clientId===cid); modernOrdersList=[]; multiOrdersSelected={}; let html=''; clientOrders.forEach(order=>{ let paid=payments.filter(p=>p.orderId===order.id).reduce((a,b)=>a+b.amount,0); let remaining=order.amount-paid; if(remaining>0){ modernOrdersList.push({id:order.id,remaining,orderNumber:order.orderNumber}); html+=`<div class="order-payment-card" id="card_${order.id}" onclick="toggleOrderSel('${order.id}')"><div class="flex-between"><span class="order-number">${order.orderNumber}</span><span style="color:var(--warning);">المتبقي: ${formatMoney(remaining)}</span></div><div onclick="event.stopPropagation()"><input type="number" id="multiAmount_${order.id}" value="${remaining.toFixed(2)}" step="0.01" onchange="updateMultiAmount('${order.id}',this.value)"></div></div>`; } }); container.innerHTML=html||'<div style="padding:20px;text-align:center;">✅ جميع الطلبات مسددة</div>'; modernOrdersList.forEach(o=>{ multiOrdersSelected[o.id]=o.remaining; document.getElementById(`card_${o.id}`)?.classList.add('selected'); updateTotalMulti(); }); document.getElementById('multiPaymentDate').value=new Date().toISOString().split('T')[0]; };
    window.toggleOrderSel=(id)=>{ let card=document.getElementById(`card_${id}`); let inp=document.getElementById(`multiAmount_${id}`); if(multiOrdersSelected[id]){ delete multiOrdersSelected[id]; card.classList.remove('selected'); inp.disabled=true; }else{ multiOrdersSelected[id]=parseFloat(inp.value)||0; card.classList.add('selected'); inp.disabled=false; } updateTotalMulti(); };
    window.updateMultiAmount=(id,val)=>{ let amount=parseFloat(val); let order=modernOrdersList.find(o=>o.id===id); if(amount>0 && amount<=order?.remaining) multiOrdersSelected[id]=amount; else delete multiOrdersSelected[id]; updateTotalMulti(); };
    function updateTotalMulti(){ let total=0; Object.values(multiOrdersSelected).forEach(v=>total+=v); document.getElementById('totalPaymentAmount').value=total.toFixed(2); }
    window.distributePaymentModern=()=>{ let total=parseFloat(document.getElementById('totalPaymentAmount').value); if(!total||total<=0) return; let totalRemaining=Object.keys(multiOrdersSelected).reduce((s,id)=>s+(modernOrdersList.find(o=>o.id===id)?.remaining||0),0); if(total>totalRemaining){ showFlash('المبلغ الإجمالي أكبر من المستحق'); return; } let sum=0; let ids=Object.keys(multiOrdersSelected); ids.forEach((id,i)=>{ let alloc=(total*(modernOrdersList.find(o=>o.id===id)?.remaining||0))/totalRemaining; alloc=Math.round(alloc*100)/100; document.getElementById(`multiAmount_${id}`).value=alloc; multiOrdersSelected[id]=alloc; sum+=alloc; }); if(Math.abs(total-sum)>0.01 && ids.length){ let diff=total-sum; let first=ids[0]; let newVal=multiOrdersSelected[first]+diff; document.getElementById(`multiAmount_${first}`).value=newVal; multiOrdersSelected[first]=newVal; } updateTotalMulti(); showFlash('تم توزيع المبلغ تلقائياً'); };
    document.getElementById('saveMultiPaymentBtn').onclick=async()=>{ let clientId=document.getElementById('multiClientSelect').value; let c=clients.find(c=>c.id===clientId); let date=new Date(document.getElementById('multiPaymentDate').value).toISOString(); let method=document.getElementById('multiPaymentMethod').value; let notes=document.getElementById('multiPaymentNotes').value; for(let [orderId,amount] of Object.entries(multiOrdersSelected)){ if(amount>0){ let o=orders.find(o=>o.id===orderId); if(o) await db.ref(`users/${currentUser.uid}/payments/${Date.now()}_${orderId}`).set({id:Date.now().toString(),orderId,clientId,clientName:c?.name,orderNumber:o.orderNumber,amount,date,method,notes,timestamp:Date.now()}); } } showFlash('تم تسجيل الدفعات بنجاح'); loadMultiClientOrdersModern(); };
    function renderSituationClients(){ let cont=document.getElementById('situationList'); let filtered=clients; cont.innerHTML=filtered.map(c=>{ let clientOrders=orders.filter(o=>o.clientId===c.id).filter(o=>{ if(!dateFilterStart&&!dateFilterEnd)return true; let d=new Date(o.date); if(dateFilterStart&&d<dateFilterStart)return false; if(dateFilterEnd&&d>dateFilterEnd)return false; return true; }); let total=clientOrders.reduce((s,o)=>s+o.amount,0); let paid=payments.filter(p=>clientOrders.some(o=>o.id===p.orderId)).reduce((s,p)=>s+p.amount,0); let perc=total? (paid/total)*100:0; return `<div class="list-item"><div class="flex-between"><span class="client-name">👤 ${c.name}</span><span class="badge ${paid>=total?'badge-paid':paid>0?'badge-partial':'badge-unpaid'}">${paid>=total?'مدفوع بالكامل':paid>0?'مسدد جزئياً':'غير مدفوع'}</span></div><div>💰 الإجمالي: ${formatMoney(total)} | ✅ المدفوع: ${formatMoney(paid)}</div><div class="progress-bar"><div class="progress-fill" style="width:${perc}%"></div></div></div>`; }).join(''); }
    function applyDateFilter(){ dateFilterStart=document.getElementById('filterDateStart').value?new Date(document.getElementById('filterDateStart').value):null; dateFilterEnd=document.getElementById('filterDateEnd').value?new Date(document.getElementById('filterDateEnd').value):null; renderSituationClients(); }
    function resetPeriodFilter(){ dateFilterStart=null; dateFilterEnd=null; document.getElementById('filterDateStart').value=''; document.getElementById('filterDateEnd').value=''; renderSituationClients(); }
    function applyPresetFilter(){ let p=document.getElementById('filterPeriodPreset').value; let d=new Date(); if(p==='today'){ document.getElementById('filterDateStart').value=d.toISOString().split('T')[0]; document.getElementById('filterDateEnd').value=d.toISOString().split('T')[0]; applyDateFilter(); } else if(p==='week'){ let start=new Date(d); start.setDate(d.getDate()-7); document.getElementById('filterDateStart').value=start.toISOString().split('T')[0]; document.getElementById('filterDateEnd').value=d.toISOString().split('T')[0]; applyDateFilter(); } else if(p==='month'){ let start=new Date(d); start.setDate(d.getDate()-30); document.getElementById('filterDateStart').value=start.toISOString().split('T')[0]; document.getElementById('filterDateEnd').value=d.toISOString().split('T')[0]; applyDateFilter(); } }
    window.applyPresetFilter=applyPresetFilter; window.applyDateFilter=applyDateFilter; window.resetPeriodFilter=resetPeriodFilter;
    window.exportClientPaymentsPDF = () => { const clientId = document.getElementById('reportClientSelect').value; if(!clientId){ showFlash('اختر عميلاً أولاً'); return; } const c = clients.find(c=>c.id===clientId); const clientOrders = orders.filter(o=>o.clientId===clientId); const clientPayments = payments.filter(p=>clientOrders.some(o=>o.id===p.orderId)).sort((a,b)=>new Date(a.date)-new Date(b.date)); const totalGeneral = clientOrders.reduce((s,o)=>s+o.amount,0); const totalPaye = clientPayments.reduce((s,p)=>s+p.amount,0); const solde = totalGeneral - totalPaye; const { jsPDF } = window.jspdf; const doc = new jsPDF('p','mm','a4'); doc.setFillColor(13,148,136); doc.rect(0,0,210,45,'F'); doc.setTextColor(255,255,255); doc.setFontSize(22); doc.text('EL FATH SERVICE',105,22,{align:'center'}); doc.setFontSize(11); doc.text('سجل المدفوعات',105,34,{align:'center'}); doc.setTextColor(0,0,0); doc.setFontSize(11); doc.text(`العميل: ${c.name}`,14,55); if(c.phone) doc.text(`الهاتف: ${c.phone}`,14,63); let periodTxt = dateFilterStart&&dateFilterEnd ? `الفترة: ${formatDate(dateFilterStart)} إلى ${formatDate(dateFilterEnd)}` : 'كل الفترات'; doc.text(periodTxt,14,71); if(clientPayments.length){ let body = clientPayments.map(p=>[formatDate(p.date), p.orderNumber, formatNumber(p.amount), p.method||'-', p.notes||'-']); doc.autoTable({ startY:85, head:[['التاريخ','رقم الطلب','المبلغ','طريقة الدفع','ملاحظات']], body, headStyles:{fillColor:[13,148,136],textColor:255}, styles:{fontSize:9}, margin:{left:14,right:14} }); } else { doc.text('لا توجد مدفوعات',14,85); } let y = doc.lastAutoTable ? doc.lastAutoTable.finalY+15 : 110; doc.setFillColor(240,240,245); doc.rect(14,y,182,35,'F'); doc.text(`إجمالي الطلبات: ${formatMoney(totalGeneral)}`,20,y+8); doc.text(`إجمالي المدفوع: ${formatMoney(totalPaye)}`,20,y+18); doc.text(`الرصيد المتبقي: ${formatMoney(solde)}`,20,y+28); doc.save(`مدفوعات_${c.name.replace(/\s/g,'_')}.pdf`); showFlash('PDF جاهز'); };
    window.exportClientOrdersPDF = () => { const clientId = document.getElementById('reportClientSelect').value; if(!clientId) return; const c = clients.find(c=>c.id===clientId); const clientOrders = orders.filter(o=>o.clientId===clientId); if(!clientOrders.length){ showFlash('لا توجد طلبات'); return; } const { jsPDF } = window.jspdf; const doc = new jsPDF('p','mm','a4'); doc.setFillColor(13,148,136); doc.rect(0,0,210,45,'F'); doc.text('EL FATH SERVICE',105,22,{align:'center'}); doc.text('قائمة الطلبات',105,34,{align:'center'}); doc.setTextColor(0,0,0); doc.text(`العميل: ${c.name}`,14,55); let body = clientOrders.map(o=>{ let paid=payments.filter(p=>p.orderId===o.id).reduce((s,p)=>s+p.amount,0); return [o.orderNumber, formatDate(o.date), formatNumber(o.amount), formatNumber(paid), formatNumber(o.amount-paid), paid>=o.amount?'مدفوع':'غير مدفوع']; }); doc.autoTable({ startY:65, head:[['رقم الطلب','التاريخ','الإجمالي','المدفوع','المتبقي','الحالة']], body, headStyles:{fillColor:[13,148,136],textColor:255}, margin:{left:14} }); doc.save(`طلبات_${c.name}.pdf`); showFlash('PDF الطلبات جاهز'); };
    window.exportSituationPDF = () => { const { jsPDF } = window.jspdf; const doc = new jsPDF('p','mm','a4'); doc.setFillColor(13,148,136); doc.rect(0,0,210,45,'F'); doc.text('EL FATH SERVICE',105,22,{align:'center'}); doc.text('تقرير وضعية العملاء',105,34,{align:'center'}); let body = clients.map(c=>{ let co=orders.filter(o=>o.clientId===c.id); let total=co.reduce((s,o)=>s+o.amount,0); let paid=payments.filter(p=>co.some(o=>o.id===p.orderId)).reduce((s,p)=>s+p.amount,0); return [c.name, c.phone||'-', co.length, formatNumber(total), formatNumber(paid), formatNumber(total-paid)]; }); doc.autoTable({ startY:55, head:[['العميل','الهاتف','عدد الطلبات','الإجمالي','المدفوع','المتبقي']], body, headStyles:{fillColor:[13,148,136],textColor:255} }); doc.save('تقرير_الوضعية.pdf'); showFlash('PDF التقرير جاهز'); };
    window.exportSituationExcel = () => { let wsData = [['العميل','الهاتف','إجمالي الطلبات (MAD)','المدفوع (MAD)','المتبقي (MAD)']]; clients.forEach(c=>{ let co=orders.filter(o=>o.clientId===c.id); let total=co.reduce((s,o)=>s+o.amount,0); let paid=payments.filter(p=>co.some(o=>o.id===p.orderId)).reduce((s,p)=>s+p.amount,0); wsData.push([c.name, c.phone||'-', total, paid, total-paid]); }); const ws = XLSX.utils.aoa_to_sheet(wsData); ws['!cols'] = [{wch:25},{wch:15},{wch:18},{wch:18},{wch:18}]; const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Situation'); XLSX.writeFile(wb, 'Situation_Clients.xlsx'); showFlash('Excel تم التصدير'); };
    function renderRecentPayments(){ let container=document.getElementById('recentPaymentsList'); if(!container)return; let recent=[...payments].sort((a,b)=>b.timestamp-a.timestamp).slice(0,8); if(!recent.length){ container.innerHTML='<div style="padding:20px;text-align:center;">لا توجد مدفوعات</div>'; return; } container.innerHTML=recent.map(p=>`<div class="list-item"><div><strong>${p.clientName}</strong> - ${formatMoney(p.amount)}</div><div class="small-text">📄 ${p.orderNumber} | 📅 ${formatDate(p.date)}</div></div>`).join(''); }
    window.showTab=(tab)=>{ document.getElementById('clientsTab').classList.add('hidden'); document.getElementById('ordersTab').classList.add('hidden'); document.getElementById('paymentsTab').classList.add('hidden'); document.getElementById('situationTab').classList.add('hidden'); document.getElementById(`${tab}Tab`).classList.remove('hidden'); document.querySelectorAll('.nav-tab').forEach((t,i)=>{ if(['clients','orders','payments','situation'][i]===tab) t.classList.add('active'); else t.classList.remove('active'); }); if(tab==='situation') renderSituationClients(); if(tab==='payments'){ updateAllSelects(); loadClientOrdersForPayment(); } };
    window.showDeleteAllModal=(type)=>{ pendingDeleteType=type; document.getElementById('deleteConfirmMessage').innerHTML='⚠️ هل أنت متأكد من حذف جميع البيانات؟ هذا الإجراء لا يمكن التراجع عنه.'; openModal('deleteConfirmModal'); };
    document.getElementById('confirmDeleteBtn').onclick=()=>{ closeModal('deleteConfirmModal'); showFlash('تم حذف جميع البيانات (تجريبي)'); };
    function initTheme(){ let saved=localStorage.getItem('elfath_theme'); if(saved==='dark') document.body.classList.add('dark'); document.getElementById('themeToggleBtn').onclick=()=>{ document.body.classList.toggle('dark'); localStorage.setItem('elfath_theme', document.body.classList.contains('dark')?'dark':'light'); }; }
    window.showOrderDetail = (orderId) => { let o=orders.find(o=>o.id===orderId); if(!o) return; let c=clients.find(c=>c.id===o.clientId); let paid=payments.filter(p=>p.orderId===orderId).reduce((s,p)=>s+p.amount,0); document.getElementById('orderDetailContent').innerHTML=`<div style="line-height:2;"><strong>${c?.name}</strong><br>رقم الطلب: ${o.orderNumber}<br>المبلغ الإجمالي: ${formatMoney(o.amount)}<br>المدفوع: ${formatMoney(paid)}<br><span style="color:var(--warning);">المتبقي: ${formatMoney(o.amount-paid)}</span></div>`; openModal('orderDetailModal'); document.getElementById('printOrderBtn').onclick=()=>{ const {jsPDF}=window.jspdf; const doc=new jsPDF(); doc.setFontSize(16); doc.text('EL FATH SERVICE',10,10); doc.setFontSize(12); doc.text(`فاتورة رقم: ${o.orderNumber}`,10,25); doc.text(`العميل: ${c?.name}`,10,35); doc.text(`المبلغ: ${formatMoney(o.amount)}`,10,45); doc.text(`المدفوع: ${formatMoney(paid)}`,10,55); doc.text(`المتبقي: ${formatMoney(o.amount-paid)}`,10,65); doc.save(`facture_${o.orderNumber}.pdf`); showFlash('تم تصدير PDF'); }; };
    window.showClientOrders = (clientId) => { let c=clients.find(c=>c.id===clientId); let clientOrders=orders.filter(o=>o.clientId===clientId); let html=`<div class="modal-content"><div class="modal-header">طلبات ${c?.name} <button onclick="closeModal('tempModal')" style="background:none; width:auto;">✕</button></div>`; clientOrders.forEach(o=>{ let paid=payments.filter(p=>p.orderId===o.id).reduce((s,p)=>s+p.amount,0); html+=`<div class="list-item">${o.orderNumber} - ${formatMoney(o.amount)} (مدفوع: ${formatMoney(paid)})</div>`; }); html+=`<button onclick="closeModal('tempModal')" style="margin-top:15px;">إغلاق</button></div>`; let modal=document.createElement('div'); modal.id='tempModal'; modal.className='modal active'; modal.innerHTML=html; document.body.appendChild(modal); };
</script>
