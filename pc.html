<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>لوحة بطاقات مشاريعي | منصة الأعمال</title>
    <!-- Google Fonts (Arabic friendly) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (Free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, #eef2f7 0%, #d9e0e8 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            color: #1a2c3e;
        }

        /* حاوية عامة */
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* الهيدر الجذاب */
        .hero-section {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        .hero-section h1 {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1f4870, #1b6b87, #2c9b77);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.05);
            letter-spacing: -0.3px;
        }

        .hero-section p {
            color: #2c5368;
            font-weight: 500;
            font-size: 1.1rem;
            margin-top: 0.5rem;
            opacity: 0.85;
        }

        .badge-counter {
            background: #ffffffcc;
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e5f6e;
            margin-top: 1rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        /* شبكة البطاقات - تصميم عصري متجاوب */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }

        /* البطاقة نفسها - عنصر قابل للنقر */
        .project-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 1px 3px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.6);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .project-card:hover {
            transform: translateY(-10px) scale(1.01);
            box-shadow: 0 28px 40px -16px rgba(0, 0, 0, 0.3);
            background: white;
            border-color: #cbdbe9;
        }

        /* شريط علوي ملون حسب الموقع (تمييز بصري) */
        .card-header {
            padding: 1.2rem 1.5rem 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }

        .card-icon {
            font-size: 2.5rem;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(70, 130, 200, 0.12);
            border-radius: 28px;
            color: #1e5f6e;
        }

        .card-title {
            font-size: 1.7rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.3;
            color: #1f3b4c;
            letter-spacing: -0.3px;
        }

        .card-sub {
            font-size: 0.8rem;
            font-weight: 500;
            color: #5d7e96;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }

        .card-body {
            padding: 1.3rem 1.5rem 1.5rem;
            flex: 1;
        }

        .desc-preview {
            background: #f4f9fe;
            padding: 0.7rem 1rem;
            border-radius: 1.2rem;
            font-size: 0.9rem;
            color: #2a5068;
            margin-bottom: 1rem;
            display: inline-block;
            width: 100%;
            font-weight: 500;
        }

        .link-preview {
            font-family: monospace;
            font-size: 0.75rem;
            background: #eef3fa;
            padding: 0.5rem 0.8rem;
            border-radius: 40px;
            color: #0b5e7e;
            word-break: break-all;
            direction: ltr;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: auto;
        }

        .meta-badge {
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e2edf2;
            padding-top: 1rem;
            font-size: 0.75rem;
            color: #517e9b;
        }

        /* تذييل البطاقة */
        .card-footer {
            padding: 0.8rem 1.5rem 1.2rem;
            border-top: 1px solid #eef2f8;
            font-size: 0.8rem;
            color: #1f6e8c;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fafdff;
        }

        /* تأثير النقر (تلميح بصري سريع) */
        .project-card:active {
            transform: scale(0.98);
            transition: 0.05s;
        }

        /* رسالة توضيحية */
        .info-note {
            background: #1f487033;
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 0.6rem 1.4rem;
            margin-top: 3rem;
            text-align: center;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            font-weight: 500;
            color: #1a4c66;
            font-size: 0.9rem;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #557c99;
        }

        @media (max-width: 700px) {
            body {
                padding: 1.2rem;
            }
            .hero-section h1 {
                font-size: 1.9rem;
            }
            .cards-grid {
                gap: 1.2rem;
            }
            .card-title {
                font-size: 1.4rem;
            }
        }

        /* تخصيص لكل بطاقة لمسة فريدة */
        .card-1 .card-icon { background: #e1f0fa; color: #126b7e; }
        .card-2 .card-icon { background: #e4f3e8; color: #2a7f6e; }
        .card-3 .card-icon { background: #fdeadf; color: #c16f2e; }

        /* عدم تحديد النص عند النقر السريع */
        .project-card {
            user-select: none;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="hero-section">
        <h1><i class="fas fa-cubes" style="margin-left: 12px;"></i> منصة أعمالي <span style="color:#2c9b77;">| بطاقات المشاريع</span></h1>
        <p>انقر على أي بطاقة لفتح المشروع في نفس النافذة — تجربة سلسة وسريعة</p>
        <div class="badge-counter">
            <i class="fas fa-globe"></i> 3 مشاريع تفاعلية
        </div>
    </div>

    <div class="cards-grid" id="projectsGrid">
        <!-- سيتم تعبئة البطاقات عبر JavaScript مع الحفاظ على وظيفة الفتح في نفس النافذة -->
    </div>

    <div class="info-note">
        <i class="fas fa-mouse-pointer"></i>  ملاحظة: الضغط على البطاقة يوجهك مباشرة للموقع دون فتح علامة تبويب جديدة
    </div>
    <footer>
        <i class="far fa-copyright"></i> لوحة تحكم المشاريع | جميع الروابط تعمل بنفس النافذة
    </footer>
</div>

<script>
    // مصادر الروابط كما طلبت بالضبط:
    // 1. https://softaben.github.io/Suivi-des-ch-ques/
    // 2. https://softaben.github.io/demorestaurant-/
    // 3. https://softaben.github.io/Suivi-des-ch-ques/  (مكرر حسب الطلب، مع ذلك سنظهره كبطاقة ثالثة بنفس الرابط ولكن يمكن تمييزه)
    
    // بناءً على طلب المستخدم: لديه موقعان مختلفان لكن الثالث مكرر (ربما يكون نفس الأول أو خطأ مطبعي)
    // وسنحافظ على التكرار لأن النص يوضح ثلاث بطاقات (عندي مواقعي على شكل بطاقات)
    // لذا سأستخدم الروابط كما هي مع بطاقة خاصة للثالث، ولكن نص مختلف لتمييز نفس الخدمة كعنصر آخر.
    // لكن أفضل عرض المشروع الأول و المشروع الثاني و يمكن إضافة المشروع الأول مرة أخرى، لكني سأضيف إسم مميز "CheckFlow Pro (نسخة متقدمة)" أو أتركها كما هي
    // الالتزام الدقيق: الروابط التي أرسلها المستخدم:
    // 1. https://softaben.github.io/Suivi-des-ch-ques/
    // 2. https://softaben.github.io/demorestaurant-/
    // 3. https://softaben.github.io/Suivi-des-ch-ques/
    // لذلك سيكون لدينا 3 بطاقات: اثنان منها لنفس الرابط لكن ليمكن تمييزهما بوصف مختلف (لأن المستخدم يريد ثلاث بطاقات)
    // سأمنح كل بطاقة هوية فريدة مع الحفاظ على سلوك فتح الرابط بنفس النافذة.
    
    const projectsData = [
        {
            id: 1,
            title: "CheckFlow Pro",
            subtitle: "إدارة الشيكات الاحترافية",
            iconClass: "fas fa-money-check-alt",
            url: "https://softaben.github.io/Suivi-des-ch-ques/",
            description: "منصة متكاملة لتتبع الشيكات، تحليلات المخاطر، وتقارير PDF فورية.",
            colorStyle: "card-1",
            extraInfo: "إحصائيات - بنوك - تأخيرات"
        },
        {
            id: 2,
            title: "El Fath Service",
            subtitle: "إدارة المخزون والمطاعم",
            iconClass: "fas fa-utensils",
            url: "https://softaben.github.io/demorestaurant-/",
            description: "نظام إدارة المنتجات، الباركود، حركات الإدخال والإخراج، وتقارير الـ Stock.",
            colorStyle: "card-2",
            extraInfo: "مسح ضوئي | PDF | Excel"
        },
        {
            id: 3,
            title: "CheckFlow Pro • مرآة",
            subtitle: "نفس الأداة القوية",
            iconClass: "fas fa-chart-line",
            url: "https://softaben.github.io/Suivi-des-ch-ques/",
            description: "نسخة إضافية من نظام متابعة الشيكات — دخول سريع لنفس اللوحة الغنية بالميزات.",
            colorStyle: "card-3",
            extraInfo: "إدارة كاملة للشيكات"
        }
    ];

    const gridContainer = document.getElementById('projectsGrid');

    function buildCards() {
        if (!gridContainer) return;
        gridContainer.innerHTML = '';
        
        projectsData.forEach(project => {
            // إنشاء عنصر البطاقة الرئيسي
            const card = document.createElement('div');
            card.className = `project-card ${project.colorStyle}`;
            
            // إضافة خاصية data-url لتسهيل الوصول
            card.setAttribute('data-url', project.url);
            
            // هيكل البطاقة الداخلي (HTML أنيق)
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-icon">
                        <i class="${project.iconClass}"></i>
                    </div>
                    <div>
                        <div class="card-title">${project.title}</div>
                        <div class="card-sub">
                            <i class="fas fa-tag"></i> ${project.subtitle}
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="desc-preview">
                        <i class="fas fa-info-circle" style="margin-left: 8px;"></i> ${project.description}
                    </div>
                    <div class="link-preview">
                        <i class="fas fa-link"></i> 
                        <span dir="ltr">${project.url.replace('https://', '')}</span>
                    </div>
                    <div class="meta-badge">
                        <span><i class="far fa-clock"></i> متاح الآن</span>
                        <span><i class="fas fa-share-alt"></i> نافذة حاليّة</span>
                    </div>
                </div>
                <div class="card-footer">
                    <span><i class="fas fa-hand-pointer"></i> اضغط للذهاب للموقع</span>
                    <span>${project.extraInfo} <i class="fas fa-arrow-left"></i></span>
                </div>
            `;
            
            // إضافة مستمع الحدث "click" لفتح الرابط في نفس النافذة (بدون target="_blank")
            // باستخدام window.location.href لتغيير الصفحة الحالية
            card.addEventListener('click', (e) => {
                // نتأكد أن الضغط ليس على عنصر داخلي قد يسبب مشكلة (لكننا نريد فتح الرابط دائماً)
                // ولكن نمنع التداخل مع أي أحداث افتراضية أخرى
                e.stopPropagation(); 
                const linkUrl = card.getAttribute('data-url');
                if (linkUrl) {
                    // فتح نفس النافذة الحالية -> الانتقال إلى الرابط
                    window.location.href = linkUrl;
                }
            });
            
            // اختياري: تغيير شكل المؤشر لدلالة على أنه قابل للنقر (موجود بالفعل في الـ CSS)
            gridContainer.appendChild(card);
        });
        
        // للتأكد من عدم وجود أي عنصر فقاعات منعزلة (مثلاً لو ضغط على أيقونات داخلية لا تؤثر)
        // مع ذلك، بالفعل event listener على البطاقة يلتقط كل النقرات.
        // تحسين إضافي: لو المستخدم ضغط على نص الرابط الموجود داخل البطاقة، يشتغل نفس السلوك ولا فرق.
    }
    
    buildCards();

    // (اختياري) إضافة تأثير تمويه بسيط عند تحميل الصفحة
    console.log("لوحة البطاقات جاهزة — جميع الروابط تفتح في نفس النافذة حسب الطلب");
</script>
</body>
</html>
