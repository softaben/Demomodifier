<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>El Fath Service · Portail Professionnel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Amazon Ember', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0b2b26 0%, #1a3f3a 100%);
            color: #e8edf2;
            line-height: 1.4;
            min-height: 100vh;
        }

        .portal {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .portal-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 3rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            animation: fadeInDown 0.6s ease-out;
        }
        .title-section h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #f0f9f4, #b7e4d4);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }
        .title-section p {
            font-size: 0.85rem;
            color: #9bb7ae;
        }
        .badge-pro {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #cfe9e0;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
            margin: 2rem 0 1rem;
        }

        .card-link {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1.8rem;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(30px);
            animation: cardEntrance 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
            position: relative;
        }
        
        .card-link:nth-child(1) { animation-delay: 0.1s; }
        .card-link:nth-child(2) { animation-delay: 0.25s; }
        .card-link:nth-child(3) { animation-delay: 0.4s; }

        @keyframes cardEntrance {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-link:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
        }
        .card-link:active {
            transform: scale(0.98);
        }

        .card-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #2a6b5e, #1e4f45);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 14px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        .card-link:hover .card-icon {
            transform: scale(1.02);
            background: linear-gradient(145deg, #348d7c, #246b5d);
        }

        .card-title {
            font-size: 1.45rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.4rem;
            letter-spacing: -0.3px;
        }
        .card-sub {
            font-size: 0.8rem;
            color: #bcd9d0;
            margin-bottom: 1rem;
            border-left: 3px solid #479e8a;
            padding-left: 0.8rem;
        }
        .card-description {
            font-size: 0.85rem;
            color: #d4eae3;
            margin: 0.8rem 0;
            line-height: 1.5;
        }
        
        .card-footer {
            margin-top: auto;
            padding-top: 1.3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: #9bc2b6;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .info-note {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #b2cfc4;
            background: rgba(0,0,0,0.25);
            padding: 0.65rem 1.2rem;
            border-radius: 60px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(4px);
            animation: fadeInUp 0.6s ease-out 0.5s both;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.7rem;
            color: #7fa298;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 1.5rem;
            animation: fadeInUp 0.6s ease-out 0.7s both;
        }

        @media (max-width: 700px) {
            .portal { padding: 1.2rem; }
            .cards-grid { gap: 1.2rem; }
            .card-title { font-size: 1.25rem; }
            .card-icon { width: 50px; height: 50px; font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="portal">
    <div class="portal-header">
        <div class="title-section">
            <h1>El Fath Service</h1>
            <p>Accès rapide · plateforme professionnelle</p>
        </div>
        <div class="badge-pro">KFP · interface intégrée</div>
    </div>

    <div class="cards-grid" id="professionalCards"></div>

    <div class="info-note">
        📱 Cliquez sur une carte → ouverture dans une autre application (nouvel onglet)
    </div>
    <footer>© El Fath · solutions digitales</footer>
</div>

<script>
    const services = [
        {
            id: "credit_clients",
            name: "Système de Gestion de Crédit Clients",
            tag: "Crédit clients · facturation",
            desc: "Gestion complète des clients, commandes, paiements échelonnés et suivi financier.",
            icon: "📊",
            url: "https://softaben.github.io/Demomodifier/"
        },
        {
            id: "gestion_stock",
            name: "Gestion de Stock",
            tag: "Stock & inventaire",
            desc: "Contrôle des produits, scanner code-barres, mouvements d'entrée/sortie et export Excel/PDF.",
            icon: "📦",
            url: "https://softaben.github.io/demorestaurant-/"
        },
        {
            id: "suivi_cheque",
            name: "SUIVI CHEQUE",
            tag: "Portail de suivi",
            desc: "Outils de suivi financier et gestion des chèques.",
            icon: "📝",
            url: "https://softaben.github.io/Suivi-des-ch-ques/"
        }
    ];

    const gridContainer = document.getElementById("professionalCards");

    function buildProCards() {
        if (!gridContainer) return;
        gridContainer.innerHTML = "";

        services.forEach(item => {
            const card = document.createElement("div");
            card.className = "card-link";
            card.setAttribute("data-url", item.url);

            card.innerHTML = `
                <div class="card-icon">${item.icon}</div>
                <div class="card-title">${item.name}</div>
                <div class="card-sub">${item.tag}</div>
                <div class="card-description">${item.desc}</div>
                <div class="card-footer">
                    <span>👆 Cliquer pour ouvrir</span>
                    <span>autre app →</span>
                </div>
            `;

            // Ouverture dans un nouvel onglet / autre application
            card.addEventListener("click", (e) => {
                const targetUrl = card.getAttribute("data-url");
                if (targetUrl) {
                    window.open(targetUrl, '_blank');
                }
            });

            gridContainer.appendChild(card);
        });
    }

    buildProCards();
</script>
</body>
</html>
